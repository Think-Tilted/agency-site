# Netlify build configuration (version-controlled so deploys are reproducible).
# See PRE-004 and ADR-002 / ADR-006.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Astro v6 requires Node >= 22.12.0 (see ADR-006). Pin the major so Netlify
  # builds match local. Bump deliberately, not implicitly.
  NODE_VERSION = "24"

# Note: no [[redirects]] needed. Astro emits dist/404.html, which Netlify serves
# automatically for unmatched paths — a catch-all redirect would be redundant.

# Baseline security headers applied to every response.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), camera=(), microphone=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://*.supabase.co; frame-ancestors 'none'"

